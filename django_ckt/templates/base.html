{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CKT - Causal Knowledge Trace{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- vis-network CSS -->
    <link href="https://unpkg.com/vis-network@9.1.6/dist/dist/vis-network.min.css" rel="stylesheet">

    <!-- Custom CSS (cache-bust with version param) -->
    <link href="{% static 'css/main.css' %}?v=20260305" rel="stylesheet">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation Bar -->
    {% include 'navbar.html' %}

    <!-- Top Notification Banner -->
    <div id="ckt-top-notification"></div>

    <!-- Main Content -->
    <div class="content-wrapper">
        <div class="container-fluid">
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <!-- Footer -->
    <footer>
        <div class="container-fluid">
            <div class="row align-items-center justify-content-end">
                <div class="col-auto">
                    <a href="https://github.com/unmtransinfo/CausalKnowledgeTrace" target="_blank" class="text-light">
                        <i class="fab fa-github"></i> GitHub
                    </a>
                </div>
                <div class="col-auto ms-3">
                    <a href="https://hsc.unm.edu/" target="_blank">
                        <img src="{% static 'images/hsclogo.png' %}" alt="UNM HSC Logo" class="footer-logo">
                    </a>
                </div>
            </div>
        </div>
    </footer>
    
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- vis-network JS (same library as Shiny/R visNetwork) -->
    <script src="https://unpkg.com/vis-network@9.1.6/dist/vis-network.min.js"></script>

    <!-- Global Top Notification Utility -->
    <script>
    /**
     * Show a top notification banner.
     * @param {Object} options
     * @param {string} options.title    - Bold title text
     * @param {string} [options.body]   - Optional secondary text
     * @param {string} [options.type]   - 'success' | 'error' | 'info' (default 'success')
     * @param {number} [options.duration] - Auto-dismiss ms (0 = manual only, default 6000)
     * @param {Object} [options.action] - Optional action button {text, url}
     */
    function showTopNotification(options) {
        var el = document.getElementById('ckt-top-notification');
        if (!el) return;

        var type = options.type || 'success';
        var duration = options.duration !== undefined ? options.duration : 6000;

        var iconMap = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
        var iconClass = iconMap[type] || iconMap.success;

        var html = '<div class="ckt-notif-bar ckt-notif-' + type + '">';
        html += '<i class="fas ' + iconClass + ' ckt-notif-icon"></i>';
        html += '<div class="ckt-notif-text">';
        html += '<span class="ckt-notif-title">' + (options.title || '') + '</span>';
        if (options.body) {
            html += '<span class="ckt-notif-body">' + options.body + '</span>';
        }
        html += '</div>';

        if (options.action && options.action.url) {
            html += '<a href="' + options.action.url + '" class="ckt-notif-action">' +
                (options.action.text || 'Go') + '</a>';
        }

        html += '<button type="button" class="ckt-notif-close" onclick="dismissTopNotification()">\u00D7</button>';
        html += '</div>';

        el.innerHTML = html;

        // Force reflow then show
        el.classList.remove('show');
        void el.offsetWidth;
        el.classList.add('show');

        if (el._autoDismissTimer) clearTimeout(el._autoDismissTimer);
        if (duration > 0) {
            el._autoDismissTimer = setTimeout(function() { dismissTopNotification(); }, duration);
        }
    }

    function dismissTopNotification() {
        var el = document.getElementById('ckt-top-notification');
        if (!el) return;
        el.classList.remove('show');
        if (el._autoDismissTimer) { clearTimeout(el._autoDismissTimer); el._autoDismissTimer = null; }
    }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
