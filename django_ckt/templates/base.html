{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CKT - Causal Knowledge Trace{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- vis-network CSS (legacy) -->
    <link href="https://unpkg.com/vis-network@9.1.6/dist/dist/vis-network.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{% static 'css/main.css' %}" rel="stylesheet">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation Bar -->
    {% include 'navbar.html' %}
    
    <!-- Main Content -->
    <div class="content-wrapper">
        <div class="container-fluid">
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <!-- Footer -->
    <footer>
        <div class="container-fluid">
            <div class="row align-items-center justify-content-end">
                <div class="col-auto">
                    <a href="https://github.com/unmtransinfo/CausalKnowledgeTrace" target="_blank" class="text-light">
                        <i class="fab fa-github"></i> GitHub
                    </a>
                </div>
                <div class="col-auto ms-3">
                    <a href="https://hsc.unm.edu/" target="_blank">
                        <img src="{% static 'images/hsclogo.png' %}" alt="UNM HSC Logo" class="footer-logo">
                    </a>
                </div>
            </div>
        </div>
    </footer>
    
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- vis-network JS (legacy) -->
    <script src="https://unpkg.com/vis-network@9.1.6/dist/vis-network.min.js"></script>

    <!-- Cytoscape.js -->
    <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
