# =============================================================================
# Development Docker Compose
# =============================================================================
# Usage: docker compose -f docker-compose.dev.yaml up --build
# Env:   Variables loaded from .env.dev
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db-dev:
    image: postgres:16
    container_name: db-dev
    networks:
      - ckt-dev-network
    env_file:
      - .env.dev
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    # Note: We use the environment variable for the port in the command
    command: ["postgres", "-c", "port=${DB_PORT}"]
    shm_size: 17g
    volumes:
      - ./causalehr_backup:/causalehr_backup:ro
      - ./restore.sh:/docker-entrypoint-initdb.d/restore.sh:ro
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      # Using pg_isready ensures the DB is actually accepting connections
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME} -p $${DB_PORT}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '16'
          memory: 64G
        reservations:
          cpus: '8'
          memory: 32G

  # ---------------------------------------------------------------------------
  # Django Application
  # ---------------------------------------------------------------------------
  django-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.django
    container_name: django-dev
    networks:
      - ckt-dev-network
    ports:
      - "${DJANGO_PORT:-3837}:${DJANGO_PORT:-3837}"
    env_file:
      - .env.dev
    environment:
      - DB_HOST=db-dev
      - DB_PORT=${DB_PORT}
      - ENVIRONMENT=development
    depends_on:
      db-dev:
        condition: service_healthy
    volumes:
      - ./django_ckt:/app
      - ./causal_analysis:/app/causal_analysis:ro
      - ./graph_creation:/app/graph_creation
      - ./graph_creation/result:/app/graph_creation/result
    user: root
    command: >
      sh -c "chown -R django:django /app/graph_creation/result &&
             python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:${DJANGO_PORT:-3837}"

networks:
  ckt-dev-network:
    driver: bridge

volumes:
  pgdata-dev:
