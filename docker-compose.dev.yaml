# =============================================================================
# Development Docker Compose
# =============================================================================
# Usage: docker compose -f docker-compose.dev.yaml up --build
# Env:   Variables loaded from .env.dev
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db-dev:
    image: postgres:16
    container_name: db-dev
    env_file:
      - .env.dev
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGPORT: ${DB_PORT}
    ports:
      - "0.0.0.0:${DB_PORT}:${DB_PORT}"
    command:
      - "postgres"
      - "-c"
      - "port=${DB_PORT}"
    shm_size: 17g
    volumes:
      - ./causalehr_backup:/causalehr_backup:ro
      - ./restore.sh:/docker-entrypoint-initdb.d/restore.sh:ro
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -p ${DB_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '16'
          memory: 64G
        reservations:
          cpus: '8'
          memory: 32G

  # ---------------------------------------------------------------------------
  # Django Application
  # ---------------------------------------------------------------------------
  # In development, we use Django's runserver for auto-reload on code changes.
  # Source code is mounted as a volume so edits are reflected immediately.
  # ---------------------------------------------------------------------------
  django-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.django
    container_name: django-dev
    ports:
      - "0.0.0.0:${DJANGO_PORT:-3837}:${DJANGO_PORT:-3837}"
    env_file:
      - .env.dev
    environment:
      - DB_HOST=db-dev          # Override to use Docker network hostname
      - ENVIRONMENT=development
    depends_on:
      db-dev:
        condition: service_healthy
    volumes:
      # Mount source code so Django's runserver auto-reloads on changes
      - ./django_ckt:/app
      - ./causal_analysis:/app/causal_analysis:ro
      # Mount graph result files so the app can list/load them
      - ./graph_creation/result:/app/graph_data/result:ro
    # Override the production CMD — use Django's dev server for hot reload
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:${DJANGO_PORT:-3837}"

volumes:
  pgdata-dev:

